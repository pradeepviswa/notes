# deploy wordpress
---
# create a ConfigMap YAML file
kind: ConfigMap
apiVersion: v1
metadata:
  name: wordpress-config
data:
  WORDPRESS_CONFIG_EXTRA: |
    define('WP_DEBUG', true);
    define('WP_POST_REVISIONS', 5);
  WORDPRESS_SITE_TITLE: "My Demo Wordpress Site"
  WORDPRESS_ADMIN_EMAIL: "pradeep.viswa@gmail.com"

---
kind: PersistentVolumeClaim
apiVersion: v1
metadata:
  name: wp-pv-claim
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 20Gi

---
kind: Deployment
apiVersion: apps/v1
metadata:
  name: wordpress
spec:
  replicas: 1
  selector:
    matchLabels:
      app: wordpress
  template:
    metadata:
      labels:
        app: wordpress
    spec:
      containers:
        - name: wordpress
          image: bitnami/wordpress:latest     # wordpress:latest alsowe can use
          env:
            - name: WORDPRESS_CONFIG_EXTRA
              valueFrom:
                configMapKeyRef:
                  name: wordpress-config
                  key: WORDPRESS_CONFIG_EXTRA
            - name: WORDPRESS_SITE_TITLE
              valueFrom:
                configMapKeyRef:
                  name: wordpress-config
                  key: WORDPRESS_SITE_TITLE
            - name: WORDPRESS_ADMIN_EMAIL
              valueFrom:
                configMapKeyRef:
                  name: wordpress-config
                  key: WORDPRESS_ADMIN_EMAIL
            - name: WORDPRESS_DB_HOST
              value: mysql
            - name: WORDPRESS_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mysql-pass
                  key: password
          ports:
            - containerPort: 80
          volumeMounts:
            - name: wp-persistent-storage
              mountPath: /var/www/html
      volumes:
        - name: wp-persistent-storage
          persistentVolumeClaim:
            claimName: wp-pv-claim

---
# Service to expose wordpress
kind: Service
apiVersion: v1
metadata:
  name: wordpress
spec:
  type: NodePort
  selector:
    app: wordpress
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30007