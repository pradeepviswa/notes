# create PersistentVolume for mysql
---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: manual-pv-mysql
spec:
  capacity:
    storage: 20Gi
  accessModes:
    - ReadWriteOnce
  hostPath:
    path: /mnt/data/mysql
    type: DirectoryOrCreate
  persistentVolumeReclaimPolicy: Retain
  storageClassName: manual

---
